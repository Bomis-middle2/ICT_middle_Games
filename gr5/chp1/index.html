<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fun with Lights using LEDs - Grade 5</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; min-height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            background: linear-gradient(135deg, #e0eafc, #cfdef3); 
            overflow: hidden;
        }
        
        /* Animated Bubble Background */
        .bubble-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .bubble { position: absolute; bottom: -100px; background: rgba(255, 255, 255, 0.3); border-radius: 50%; animation: rise 15s infinite ease-in; }
        @keyframes rise { 0% { transform: translateY(0); opacity: 0; } 50% { opacity: 0.6; } 100% { transform: translateY(-110vh); opacity: 0; } }

        /* UI Containers */
        #logo-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 9999; }
        #quiz-container, #intro-screen { 
            background: rgba(255, 255, 255, 0.95); 
            width: 90%; max-width: 600px; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            text-align: center;
            box-sizing: border-box;
        }
        
        .hidden { display: none !important; }
        .option-btn { border: 2px solid #3498db; border-radius: 10px; padding: 12px; margin: 8px 0; background: white; cursor: pointer; display: block; width: 100%; font-weight: 600; transition: 0.3s; font-size: 1rem; }
        .option-btn:hover { background: #3498db; color: white; }
        .hint-box { background: #fff3cd; padding: 10px; border-radius: 8px; margin-top: 15px; color: #856404; font-weight: bold; font-size: 0.9rem; }
        .feedback-correct { border: 2px solid green; background: #d4edda; padding: 10px; border-radius: 8px; color: #155724; font-weight: bold; margin-top: 15px; }
        #q-text { font-weight: bold; font-size: 1.1rem; margin-bottom: 20px; text-align: left; }
    </style>
</head>
<body>

<div id="logo-screen"><img src="assets/innovine-logo.png" alt="Logo"></div>
<div class="bubble-bg" id="bubbles"></div>

<div id="intro-screen" class="hidden">
    <h1>Fun with Lights using LEDs</h1>
    <div style="margin: 20px 0; text-align: left; background: #f9f9f9; padding: 15px; border-radius: 10px;">
        <p><strong>Grade: </strong> 5</p>
<p><strong>Subject: </strong>ICT</p>

        <p><strong>Topic: </strong>Fun with Lights using LEDs</p>
	<p><strong>No. of Questions: </strong>12</p>
    </div>
    <button onclick="startQuiz()" style="padding: 15px 40px; font-size: 18px; cursor: pointer; background: #2c3e50; color: white; border: none; border-radius: 50px;">Start Quiz</button>
</div>

<div id="quiz-container" class="hidden">
    <div id="game-area">
        <div id="top-bar" style="display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 20px;">
            <div id="timer">45s</div>
            <div id="score-display">Score: 0</div>
        </div>
        <div id="q-text"></div>
        <div id="options"></div>
        <div id="feedback"></div>
    </div>
</div>

<script>
   const questions = [
    { 
        q: "Arjun is building a small flashlight and notices the LED has two legs of different lengths. Which leg should he connect to the positive terminal of the battery?", 
        a: "B. The longer leg (Anode)", 
        options: ["A. The shorter leg (Cathode)", "B. The longer leg (Anode)", "C. Both legs together", "D. It does not matter"], 
        hint: "In an LED, the longer terminal is standard for the positive connection." 
    },
    { 
        q: "Assertion: LEDs are considered more eco-friendly than CFL bulbs. Reason: LEDs contains hazardous substances like mercury to glow. Choose the correct evaluation:", 
        a: "C. Assertion is true but Reason is false.", 
        options: ["A. Both are true and Reason explains Assertion.", "B. Both are true but Reason does not explain Assertion.", "C. Assertion is true but Reason is false.", "D. Assertion is false but Reason is true."], 
        hint: "Consider the environmental impact and composition of both bulb types." 
    },
    { 
        q: "Maya sets up a circuit with a battery, an LED, and a switch. When she closes the switch, the LED does not light up. Which of these errors would prevent the LED from glowing?", 
        a: "C. A break in the wire (open circuit).", 
        options: ["A. Using a resistor that is too small.", "B. Connecting the anode to the positive terminal.", "C. A break in the wire (open circuit).", "D. Using a red LED instead of a green one."], 
        hint: "Electricity requires a complete, unbroken path to flow." 
    },
    { 
        q: "Look at the standard electronic symbol for a diode: <br><img src='assets/G5_ICT_SB_Chapter 1_Q4.png' style='max-width:200px; display:block; margin: 10px 0;'> In this symbol, what do the two arrows pointing away from the triangle represent?", 
        a: "B. Light being emitted", 
        options: ["A. The direction of battery flow", "B. Light being emitted", "C. The negative terminal", "D. Heat energy"], 
        hint: "These arrows indicate that light is radiating from the component." 
    },
    { 
        q: "A student is told that a resistor of 330 to 350 ohms is needed for a 9V battery circuit to protect the LED. Which of these is the safest to use so the LED doesn't burn out?", 
        a: "C. 350 ohms", 
        options: ["A. 10 ohms", "B. 100 ohms", "C. 350 ohms", "D. 0 ohms"], 
        hint: "Higher resistance limits the current more, protecting the sensitive LED." 
    },
    { 
        q: "Rohan wants to save electricity by replacing his old incandescent bulbs. Why is switching to LEDs a good choice?", 
        a: "B. They consume significantly less electricity.", 
        options: ["A. They take longer to light up.", "B. They consume significantly less electricity.", "C. They contain mercury which helps them glow.", "D. They only work with 9V batteries."], 
        hint: "LEDs are known for high energy efficiency compared to traditional bulbs." 
    },
    { 
        q: "In a basic lighting circuit with an LED, a resistor, a battery, and copper wires, which component is considered the 'Power Source'?", 
        a: "C. Battery", 
        options: ["A. LED bulb", "B. Resistor", "C. Battery", "D. Copper Wire"], 
        hint: "Think about which component provides the energy to the circuit." 
    },
    { 
        q: "Sana is using a breadboard to light an LED. She notices the light is very dim. What is the primary role of the 'Resistor' she included in the circuit?", 
        a: "C. To limit or regulate the flow of electricity.", 
        options: ["A. To provide electricity like a battery.", "B. To act as a switch to turn it off.", "C. To limit or regulate the flow of electricity.", "D. To change the color of the light."], 
        hint: "A resistor acts as a gatekeeper for current flow." 
    },
    { 
        q: "A technician needs a light that reaches full brightness the very millisecond it is turned on. Which feature of LEDs makes them suitable for this?", 
        a: "B. Instant lighting", 
        options: ["A. Compact size", "B. Instant lighting", "C. Energy efficiency", "D. Semiconductor material"], 
        hint: "Unlike other bulbs, LEDs do not require a warm-up period." 
    },
    { 
        q: "A simple circuit is a closed loop. If a student cuts the wire in the middle of the loop while the battery is connected, what will happen to the current flow?", 
        a: "B. It will stop flowing immediately.", 
        options: ["A. It will flow faster.", "B. It will stop flowing immediately.", "C. It will flow through the air to reach the bulb.", "D. The bulb will get brighter."], 
        hint: "Current cannot flow through an open circuit." 
    },
    { 
        q: "In the given circuit diagram, will the LED glow? Why or why not?<br><img src='assets/G5_ICT_SB_Chapter 1_Q11.png' style='max-width:200px; display:block; margin: 10px 0;'>", 
        a: "B. No, the LED is connected in reverse (polarity error).", 
        options: ["A. Yes, all components are present.", "B. No, the LED is connected in reverse (polarity error).", "C. Yes, the switch is closed.", "D. No, because there is no bulb holder."], 
        hint: "Observe the orientation of the LED legs relative to the battery terminals." 
    },
    { 
        q: "Traditional incandescent bulbs waste energy as heat, whereas LEDs convert electrical energy directly into light. What does this make LEDs?", 
        a: "A. Highly energy efficient", 
        options: ["A. Highly energy efficient", "B. Dangerous to touch", "C. Very heavy", "D. Fragile like glass"], 
        hint: "Think about the lack of waste energy compared to older bulbs." 
    }
];

    let currentQ = 0, score = 0, attempts = 0, timer, timeLeft = 45;
    const correctSound = new Audio('assets/correct.mp3');
    const wrongSound = new Audio('assets/wrong.mp3');

    // Create bubbles
    const bg = document.getElementById('bubbles');
    for(let i=0; i<15; i++) {
        let b = document.createElement('div');
        b.className = 'bubble';
        let size = Math.random() * 60 + 20 + 'px';
        b.style.width = size; b.style.height = size;
        b.style.left = Math.random() * 100 + '%';
        b.style.animationDelay = Math.random() * 10 + 's';
        bg.appendChild(b);
    }

    window.addEventListener('load', () => setTimeout(() => { document.getElementById('logo-screen').classList.add('hidden'); document.getElementById('intro-screen').classList.remove('hidden'); }, 2000));

    function startQuiz() { document.getElementById('intro-screen').classList.add('hidden'); document.getElementById('quiz-container').classList.remove('hidden'); renderQuestion(); }

    function renderQuestion() {
        clearInterval(timer); attempts = 0; timeLeft = 45;
        document.getElementById('timer').innerText = timeLeft + "s";
        document.getElementById('feedback').className = ""; document.getElementById('feedback').innerText = "";
        const q = questions[currentQ];
        document.getElementById('q-text').innerHTML = (currentQ + 1) + ". " + q.q;
        const optDiv = document.getElementById('options'); optDiv.innerHTML = "";
        q.options.forEach(o => { const btn = document.createElement('button'); btn.className = "option-btn"; btn.innerText = o; btn.onclick = () => checkAnswer(o); optDiv.appendChild(btn); });
        timer = setInterval(() => { timeLeft--; document.getElementById('timer').innerText = timeLeft + "s"; if(timeLeft <= 0) { clearInterval(timer); nextQuestion(); } }, 1000);
    }

    function checkAnswer(choice) {
        const feedback = document.getElementById('feedback');
        if(choice === questions[currentQ].a) {
            score++; document.getElementById('score-display').innerText = "Score: " + score;
            feedback.className = 'feedback-correct'; feedback.innerText = "Correct!";
            correctSound.play(); confetti(); setTimeout(nextQuestion, 1000);
        } else {
            attempts++; wrongSound.play();
            if(attempts < 2) { feedback.className = 'hint-box'; feedback.innerText = "Hint: " + questions[currentQ].hint; }
            else { feedback.className = 'feedback-correct'; feedback.innerText = "Correct: " + questions[currentQ].a; setTimeout(nextQuestion, 2000); }
        }
    }

    function nextQuestion() {
        currentQ++;
        if(currentQ < questions.length) renderQuestion();
        else { document.getElementById('game-area').innerHTML = `<h1>Quiz Finished!</h1><p>Score: ${score}/${questions.length}</p><button onclick="location.reload()" style="padding: 15px 30px; cursor: pointer; margin-top:20px;">Restart Quiz</button>`; }
    }
</script>
</body>
</html>
