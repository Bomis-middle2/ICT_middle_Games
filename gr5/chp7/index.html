<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Using The Internet Sudoku</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --blue: #4a90e2; --shadow: #2a6dbd; }
        body { 
            font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%; animation: gradient 15s ease infinite; color: white;
        }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        #logo-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 1s; }
        .screen { padding: 20px; background: rgba(0,0,0,0.2); border-radius: 20px; margin: 10px auto; max-width: 600px; }
        .hidden { display: none !important; }
        
        /* Intro Content Styling */
        .info-header { margin-bottom: 20px; }
        .info-header h1 { margin-bottom: 5px; }
        .rules-box { background: #fff; color: #333; border: 2px solid var(--blue); padding: 15px; margin: 20px auto; text-align: left; border-radius: 10px; }
        
        .word-bank { font-weight: bold; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 8px; margin: 10px 0; }
        
        button { 
            padding: 15px 30px; background: var(--blue); color: white; border: none; 
            border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold;
            box-shadow: 0 6px var(--shadow); transition: all 0.1s; margin: 10px;
        }
        button:active { transform: translateY(4px); box-shadow: 0 2px var(--shadow); }

        #timer { font-size: 24px; font-weight: bold; color: yellow; margin: 10px; }
        .sudoku-container { display: grid; grid-template-columns: repeat(2, 1fr); border: 4px solid #fff; width: fit-content; margin: 20px auto; }
        .block { display: grid; grid-template-columns: repeat(2, 1fr); border: 2px solid #fff; }
        input { width: 50px; height: 50px; text-align: center; border: 1px solid #ccc; text-transform: uppercase; font-size: 14px; font-weight: 800; color: black; }
        @media (max-width: 400px) { input { width: 40px; height: 40px; } }
    </style>
</head>
<body>

    <div id="logo-screen"><img src="assets/innovine-logo.png" alt="Innovine Logo"></div>

    <audio id="wrong-audio" src="assets/wrong.mp3"></audio>
    <audio id="correct-audio" src="assets/correct.mp3"></audio>

    <div id="intro-screen" class="screen">
        <div class="info-header">
            <h1>Using the Internet Sudoku</h1>
            <p><strong>Grade:</strong> 5 | <strong>Subject:</strong> ICT | <strong>Topic:</strong> Using the Internet</p>
        </div>
        
        <div class="rules-box">
            <h3>How to Play</h3>
            <ul>
                <li>Place <strong>SAFE, SHARE, EMAIL, VIRUS</strong> once per row, column, and 2x2 block.</li>
                <li><strong>Max time limit: 2 minutes</strong>.</li>
            </ul>
        </div>
        <button onclick="startGame()">Start Game</button>
    </div>

    <div id="game-screen" class="screen hidden">
        <div id="timer">Time Left: 2:00</div>
        <h3>Word Bank: SAFE, SHARE, EMAIL, VIRUS</h3>
        <div class="word-bank">Use these words to fill the grid!</div>
        <div class="sudoku-container" id="grid"></div>
        <button onclick="checkAnswers()">Check My Answers</button>
    </div>

    <div id="result-screen" class="screen hidden">
        <h1 id="result-msg"></h1>
        <button onclick="location.reload()">Replay Game</button>
    </div>

    <script>
        let timeLeft = 120;
        let timerInterval;
        const correctPattern = ['SAFE', 'SHARE', 'EMAIL', 'VIRUS', 'EMAIL', 'VIRUS', 'SAFE', 'SHARE', 'SHARE', 'SAFE', 'VIRUS', 'EMAIL', 'VIRUS', 'EMAIL', 'SHARE', 'SAFE'];

        setTimeout(() => {
            const logo = document.getElementById('logo-screen');
            logo.style.opacity = '0';
            setTimeout(() => logo.remove(), 1000);
        }, 5000);

        function startGame() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('game-screen').classList.remove('hidden');
            timerInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            timeLeft--;
            document.getElementById('timer').innerText = `Time Left: ${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2, '0')}`;
            if (timeLeft <= 0) endGame(false, "Time's up! Try again ⏳");
        }

        function checkAnswers() {
            const inputs = document.querySelectorAll('input');
            let isCorrect = Array.from(inputs).every((input, i) => input.value.toUpperCase() === correctPattern[i]);
            if (isCorrect) endGame(true, "Great Job!");
            else {
                const audio = document.getElementById('wrong-audio');
                if (audio) audio.play();
                endGame(false, "Try again! 🔄");
            }
        }

        function endGame(isSuccess, message) {
            clearInterval(timerInterval);
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('result-msg').innerText = message;
            if (isSuccess) {
                const audio = document.getElementById('correct-audio');
                if (audio) audio.play();
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
        }

        const container = document.getElementById('grid');
        for (let b = 0; b < 4; b++) {
            let block = document.createElement('div');
            block.className = 'block';
            for (let i = 0; i < 4; i++) {
                let input = document.createElement('input');
                input.maxLength = 6;
                block.appendChild(input);
            }
            container.appendChild(block);
        }
    </script>
</body>
</html>
