<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binary to Decimal Builder</title>

<style>
/* --- 1. LOGO SCREEN STYLES --- */
#logo-screen {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 3000;
}

#logo-screen img {
    max-width: 350px;
    animation: fadeOut 0.5s forwards;
    animation-delay: 4.5s;
}

/* --- 2. INFO SCREEN STYLES --- */
#info-screen {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(135deg, #764ba2, #667eea);
    display: none; /* Shown via JS after 5s */
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 2000;
    color: white;
    font-family: 'Arial', sans-serif;
    text-align: center;
}

.info-card {
    background: rgba(255, 255, 255, 0.15);
    padding: 40px;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.3);
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    max-width: 80%;
}

.info-card h1 { font-size: 36px; margin-bottom: 20px; color: #ffd700; }
.info-card p { font-size: 20px; margin: 12px 0; letter-spacing: 0.5px; }

.start-btn {
    margin-top: 30px;
    padding: 15px 45px;
    font-size: 22px;
    font-weight: bold;
    color: #764ba2;
    background: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: transform 0.3s, background 0.3s;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.start-btn:hover { transform: scale(1.1); background: #ffd700; }

/* --- 3. GAME CONTENT STYLES (Existing) --- */
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

#game-content { display: none; }

.container { padding: 20px; max-width: 500px; margin: auto; }
.binary-box, .decimal-box { margin: 15px 0; padding: 10px; border-radius: 10px; background: rgba(255,255,255,0.1); }
.binary { font-size: 28px; letter-spacing: 8px; }
.weights button { padding: 12px; margin: 8px; font-size: 16px; border-radius: 8px; border: none; cursor: pointer; }
.weights button.active { background: #00ffcc; }
.submit-btn {
    margin-top: 15px; padding: 14px 25px; font-size: 18px; font-weight: bold; border: none; border-radius: 30px;
    cursor: pointer; color: white; background: linear-gradient(45deg, #ff512f, #dd2476);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: all 0.3s ease;
}
.submit-btn:hover { transform: scale(1.08); }
#hint { margin-top: 10px; color: #ffd700; }
#result { margin-top: 15px; font-size: 18px; }
#restartBtn { margin-top: 15px; padding: 10px 20px; border: none; background: #00c6ff; color: white; border-radius: 8px; display: none; cursor: pointer; }
#confetti { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 4000; }

@keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
</style>
</head>
<body>

<div id="logo-screen">
    <img src="assets/innovine-logo.png" alt="Innovine Solutions">
</div>

<div id="info-screen">
    <div class="info-card">
        <h1>Binary to Decimal Builder <br>Interactive Game</h1>
        <p><strong>Grade:</strong> 5</p>
        <p><strong>Subject:</strong> ICT</p>
        <p><strong>Topic:</strong> Number Systems</p>
        <button class="start-btn" onclick="startGame()">Start Learning 🚀</button>
    </div>
</div>

<div id="game-content">
    <div class="container">
        <h1>🎮 Binary to Decimal Builder</h1>
        <div class="binary-box">
            <h3>Binary</h3>
            <div class="binary" id="binary"></div>
        </div>
        <div class="weights">
            <button onclick="toggle(8)">8</button>
            <button onclick="toggle(4)">4</button>
            <button onclick="toggle(2)">2</button>
            <button onclick="toggle(1)">1</button>
        </div>
        <div id="hint">💡 Hint: Add only where you see 1 (8421 rule)</div>
        <button class="submit-btn" onclick="checkAnswer()">🚀 Submit Answer</button>
        <div class="decimal-box">
            <h3>Decimal (Answer)</h3>
            <div id="decimalAnswer">---</div>
        </div>
        <div id="result"></div>
        <button id="restartBtn" onclick="restartGame()">Restart</button>
    </div>
</div>

<canvas id="confetti"></canvas>
<audio id="correctSound" src="assets/correct.mp3"></audio>
<audio id="wrongSound" src="assets/wrong.mp3"></audio>

<script>
// Transition Logic
window.addEventListener('DOMContentLoaded', () => {
    // Wait 5 seconds, then hide logo and show info page
    setTimeout(() => {
        document.getElementById('logo-screen').style.display = 'none';
        document.getElementById('info-screen').style.display = 'flex';
    }, 5000); 
});

function startGame() {
    document.getElementById('info-screen').style.display = 'none';
    document.getElementById('game-content').style.display = 'block';
    loadQuestion();
}

// --- Game Logic ---
const questions = [
    { binary: "1001", answer: 9 },
    { binary: "1100", answer: 12 },
    { binary: "1010", answer: 10 },
    { binary: "1111", answer: 15 }
];

let current = 0;
let selected = [];
let score = 0;

function loadQuestion() {
    selected = [];
    document.querySelectorAll(".weights button").forEach(b => b.classList.remove("active"));
    document.getElementById("binary").innerText = questions[current].binary;
    document.getElementById("decimalAnswer").innerText = "---";
    document.getElementById("result").innerText = "";
}

function toggle(value) {
    if (selected.includes(value)) {
        selected = selected.filter(v => v !== value);
    } else {
        selected.push(value);
    }
    document.querySelectorAll(".weights button").forEach(btn => {
        btn.classList.toggle("active", selected.includes(parseInt(btn.innerText)));
    });
}

function checkAnswer() {
    let sum = selected.reduce((a,b)=>a+b,0);
    let correct = questions[current].answer;
    document.getElementById("decimalAnswer").innerText = correct;

    if (sum === correct) {
        document.getElementById("result").innerText = "✅ Correct!";
        score++;
    } else {
        document.getElementById("result").innerText = "❌ Wrong! Correct answer was " + correct;
    }

    current++;
    setTimeout(() => {
        if (current < questions.length) {
            loadQuestion();
        } else {
            document.getElementById("result").innerText = "🎉 Game Over! Score: " + score;
            document.getElementById("restartBtn").style.display = "inline-block";
            startConfetti();
        }
    }, 1500);
}

function restartGame() {
    current = 0;
    score = 0;
    stopConfetti();
    document.getElementById("restartBtn").style.display = "none";
    loadQuestion();
}

// Confetti logic
const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let confetti = [];

function startConfetti() {
    for (let i = 0; i < 150; i++) {
        confetti.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 6
        });
    }
    drawConfetti();
}

function drawConfetti() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    confetti.forEach(c=>{
        ctx.beginPath();
        ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
        ctx.fillStyle = "hsl(" + Math.random()*360 + ",100%,50%)";
        ctx.fill();
        c.y += 2;
        if(c.y > canvas.height) c.y = 0;
    });
    if(confetti.length > 0) requestAnimationFrame(drawConfetti);
}

function stopConfetti() {
    confetti = [];
    ctx.clearRect(0,0,canvas.width,canvas.height);
}
</script>

</body>
</html>
