<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Authoring Quiz</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; }
        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center;
            background: url('assets/tags.png') no-repeat center center fixed; background-size: cover; 
        }
        #game-container { 
            background: rgba(255, 255, 255, 0.95); width: 90%; max-width: 500px; 
            padding: 25px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); text-align: center;
        }
        .hidden { display: none !important; }
        .info-box { margin-bottom: 20px; color: var(--primary); text-align: left; }
        .info-box p { margin: 5px 0; font-weight: bold; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        #logo-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

<div id="logo-screen"><img src="assets/innovine-logo.png" alt="Logo"></div>

<div id="game-container">
    <div id="intro-screen">
        <h1>Web Authoring Lab</h1>
        <div class="info-box">
            <p>Grade: 7</p>
            <p>Subject: ICT</p>
            <p>Topic: Web Authoring in HTML</p>
            <p>Number of Questions: 6</p>
        </div>
        <button onclick="startGame()">Start Quiz</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div style="text-align: right; font-weight: bold;">Score: <span id="score">0</span></div>
        <h3 id="question"></h3>
        <input type="text" id="answer-input" placeholder="Type your answer here..." autocomplete="off">
        <button onclick="checkAnswer()">Submit Answer</button>
    </div>

    <div id="result-screen" class="hidden">
        <h2 id="result-msg"></h2>
        <button onclick="location.reload()">Restart Game</button>
    </div>
</div>

<audio id="sound-correct" src="assets/correct.mp3"></audio>
<audio id="sound-wrong" src="assets/wrong.mp3"></audio>

<script>
    const quizData = [
        { q: "You want to make your website title stand out. Which tag do you use for the largest heading?", a: "h1" },
        { q: "Your text is bunched together. Which tag do you insert to force a new line?", a: "br" },
        { q: "You want to separate two sections of your page with a horizontal line. What tag do you type?", a: "hr" },
        { q: "You want to change the page background to yellow using an attribute in the body tag. What is the attribute name?", a: "bgcolor" },
        { q: "Your page content is invisible in the browser. Which main container tag must you use to wrap your content?", a: "body" },
        { q: "You need to define the text that appears on the browser tab. Which tag is used for this?", a: "title" }
    ];

    let currentQ = 0, score = 0;

    // Logo timeout
    setTimeout(() => { document.getElementById('logo-screen').classList.add('hidden'); }, 5000);

    function startGame() {
        document.getElementById('intro-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        document.getElementById('question').innerText = quizData[currentQ].q;
        document.getElementById('answer-input').value = '';
        document.getElementById('answer-input').focus();
    }

    function checkAnswer() {
        const userAns = document.getElementById('answer-input').value.trim().toLowerCase();
        if (userAns === quizData[currentQ].a.toLowerCase()) {
            score++;
            document.getElementById('sound-correct').play();
            alert("Correct! Great work.");
        } else {
            document.getElementById('sound-wrong').play();
            alert("Incorrect. The correct answer was: " + quizData[currentQ].a);
        }
        document.getElementById('score').innerText = score;
        currentQ++;
        if (currentQ < quizData.length) loadQuestion();
        else showResult();
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        const pct = (score / quizData.length) * 100;
        let msg = pct >= 75 ? "Good job" : pct >= 40 ? "Review this chapter and try again" : "Let’s practise more";
        document.getElementById('result-msg').innerText = `${msg} (Score: ${Math.round(pct)}%)`;
    }
</script>
</body>
</html>
