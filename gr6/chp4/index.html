<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calc Tic-Tac-Toe</title>
    <style>
        body { font-family: sans-serif; background: #fff; display: flex; flex-direction: column; align-items: center; }
        #intro { text-align: center; padding-top: 50px; }
        #game-container { display: none; text-align: center; }
        #rules { max-width: 400px; margin: 10px auto; padding: 10px; background: #fffde7; border: 1px solid #ddd; border-radius: 8px; }
        #grid-wrapper { background: #f0f4f8; padding: 20px; border-radius: 12px; display: inline-block; }
        #board { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; }
        .cell { width: 100px; height: 100px; font-size: 2.5rem; cursor: pointer; border: 3px solid #333; background: #f8f8f8; transition: all 0.3s ease; }
        .cell:hover { transform: scale(1.05); background: #e0e0e0; }
        .cell.X { color: #e74c3c; background: #ffdada; }
        .cell.O { color: #3498db; background: #d6ebfa; }
        .btn-main { padding: 15px 30px; cursor: pointer; background: #333; color: #fff; border: none; border-radius: 8px; margin-top: 20px; }
        #logo { width: 250px; }
    </style>
</head>
<body>
    <div id="intro">
        <img src="assets/innovine-logo.png" id="logo" alt="Logo">
        <h1>Grade 6 ICT: OpenOffice Calc</h1>
        <button class="btn-main" onclick="startGame()">Start Game</button>
    </div>
    <div id="game-container">
        <div id="rules"><strong>Rules:</strong> Answer the questions to place 'X'; 3-in-a-row wins; Computer plays 'O'.</div>
        <div id="grid-wrapper">
            <div id="board"></div>
            <button class="btn-main" onclick="location.reload()">Reset Game</button>
        </div>
    </div>
    <script>
        let board = Array(9).fill(null), gameActive = true;
        let pool = [
            { q: "What statistical function is used to calculate the total of a range of cells?", a: "SUM()" },
            { q: "Which tool allows you to copy a formula to adjacent cells by dragging?", a: "Fill Handle" },
            { q: "Which function is used to find the average value of a set of numbers?", a: "AVERAGE()" },
            { q: "Which feature allows you to display only data that meets specific conditions?", a: "Filtering" },
            { q: "If you want to arrange data from Z to A, which sorting order is this?", a: "Descending" },
            { q: "All mathematical formulas in Calc must begin with which symbol?", a: "=" },
            { q: "Which function finds the smallest number in a selected range?", a: "MIN()" }
        ];
        
        function startGame() { document.getElementById('intro').style.display = 'none'; document.getElementById('game-container').style.display = 'block'; render(); }
        
        function handleMove(i) {
            if(!gameActive || board[i] || pool.length === 0) return;
            
            // Question is pulled from pool immediately, ensuring it cannot be repeated
            const q = pool.splice(Math.floor(Math.random() * pool.length), 1)[0];
            const ans = prompt(q.q);
            
            if(ans && ans.toUpperCase() === q.a.toUpperCase()) { 
                board[i] = 'X'; new Audio('assets/correct.mp3').play(); render(); checkWinner(); 
                if(gameActive) setTimeout(computerMove, 600); 
            } else { 
                new Audio('assets/wrong.mp3').play(); 
                alert("Incorrect. The correct answer was: " + q.a + ". This question is now removed."); 
                // We do NOT push it back to the pool, so it will not repeat
            }
        }
        
        function computerMove() {
            let move = (Math.random() < 0.3) ? null : (findBest('O') || findBest('X'));
            if (move === null) {
                let avail = board.map((v,i)=>v===null?i:null).filter(v=>v!==null);
                move = avail[Math.floor(Math.random()*avail.length)];
            }
            if(move !== null) { board[move] = 'O'; render(); checkWinner(); }
        }
        
        function findBest(p) {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let l of lines) { let c = l.map(i=>board[i]); if(c.filter(v=>v===p).length === 2 && c.includes(null)) return l[c.indexOf(null)]; }
            return null;
        }
        
        function checkWinner() {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let l of lines) { const [a,b,c] = l; if(board[a] && board[a] === board[b] && board[a] === board[c]) { 
                gameActive = false; alert(board[a] + " wins!"); return; 
            }}
            if(!board.includes(null)) { gameActive = false; alert("It's a draw!"); }
        }
        
        function render() {
            const bEl = document.getElementById('board'); bEl.innerHTML = '';
            board.forEach((v, i) => { const btn = document.createElement('button'); btn.className = 'cell ' + (v || ''); btn.innerText = v || ''; btn.onclick = () => handleMove(i); bEl.appendChild(btn); });
        }
    </script>
</body>
</html>
