<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Backup Game</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-bg: rgba(255, 255, 255, 0.1);
            --selected-bg: #4facfe;
            --text-color: #ffffff;
            --accent-green: #2ecc71;
            --accent-red: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        /* Branding Splash Screen */
        #splashScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out;
        }

        #splashScreen img {
            max-width: 80%;
            max-height: 60%;
            object-fit: contain;
        }

        /* Screens Setup */
        .screen {
            display: none;
            width: 100%;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.3);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(4px);
            box-sizing: border-box;
        }

        .active {
            display: block;
        }

        h1 { margin-top: 0; font-size: 28px; }
        h2 { font-size: 22px; color: #00f2fe; }
        p { font-size: 18px; line-height: 1.5; }

        .meta-info {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: left;
        }

        /* Interactive Controls */
        .btn {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 15px 32px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            max-width: 250px;
            margin: 10px auto;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.1s ease;
        }

        .btn:active { transform: scale(0.98); }
        .btn-orange { background: #f39c12; }
        .audio-toggle {
            background: none;
            border: 2px solid white;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        /* Grid & Gameplay elements */
        .score-tracker {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.15);
            padding: 10px;
            border-radius: 5px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 500px) {
            .game-grid { grid-template-columns: 1fr; }
        }

        .interactive-card {
            background: var(--card-bg);
            border: 3px solid rgba(255,255,255,0.4);
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-sizing: border-box;
            font-size: 18px;
            font-weight: bold;
        }

        .interactive-card img {
            max-width: 90px;
            max-height: 90px;
            pointer-events: none;
        }

        .interactive-card.selected {
            border-color: var(--selected-bg);
            background: rgba(79, 172, 254, 0.3);
            transform: scale(1.03);
        }

        .interactive-card.matched {
            border-color: var(--accent-green);
            background: rgba(46, 204, 113, 0.2);
            cursor: default;
            opacity: 0.6;
        }

        /* Educational Feedback banner */
        #feedbackPanel {
            margin-top: 20px;
            min-height: 60px;
            font-size: 18px;
            font-weight: bold;
            padding: 10px;
            border-radius: 8px;
        }
        .correct-banner { background: rgba(46, 204, 113, 0.3); color: #2ecc71; }
        .wrong-banner { background: rgba(231, 76, 60, 0.3); color: #ff7675; }

        /* Confetti Graphics */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #f1c40f;
            top: -10px;
            z-index: 999;
            animation: fall 2.5s linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- BRANDING SPLASH SCREEN -->
    <div id="splashScreen">
        <img src="assets/innovine-logo.png" alt="Innovine Logo">
    </div>

    <button id="muteBtn" class="audio-toggle" onclick="toggleMute()">🔊 Sound: ON</button>

    <!-- INTRO SCREEN -->
    <div id="introScreen" class="screen">
        <h1>💾 Data Backup & Cloud Storage Game</h1>
        <div class="meta-info">
            <p><strong>Grade:</strong> 6</p>
            <p><strong>Subject:</strong> Information and Communication Technology</p>
            <p><strong>Topic:</strong> Cloud Storage & Data Security</p>
            <p><strong>Number of Questions:</strong> 4 Matchmaking Pairs</p>
        </div>
        <p>Instructions: Tap an image card, then tap its correct matching definition card!</p>
        <button class="btn" onclick="showGame()">Start Game</button>
    </div>

    <!-- GAMEPLAY AREA -->
    <div id="gameScreen" class="screen">
        <div class="score-tracker">Score: <span id="currentScore">0</span> / 4</div>
        
        <div class="game-grid">
            <!-- Left side: Images -->
            <div id="imageColumn" style="display: flex; flex-direction: column; gap: 15px;"></div>
            <!-- Right side: Definitions -->
            <div id="textColumn" style="display: flex; flex-direction: column; gap: 15px;"></div>
        </div>

        <div id="feedbackPanel"></div>
    </div>

    <!-- RESULT SCREEN -->
    <div id="resultScreen" class="screen">
        <h2>Game Completed!</h2>
        <p id="finalScoreText"></p>
        <p id="resultMessage" style="font-size: 20px; font-weight: bold; margin: 20px 0;"></p>
        <button class="btn btn-orange" onclick="resetGame()">Try Again</button>
    </div>

    <!-- AUDIO MANAGEMENT -->
    <audio id="correctSound" src="assets/correct.mp3"></audio>
    <audio id="wrongSound" src="assets/wrong.mp3"></audio>

    <script>
        // Game items dataset
        const gameItems = [
            { id: "backup", img: "assets/image_backup.png", text: "📂 Making copies of data", feedback: "Backups store copies safely elsewhere in case your original device breaks!" },
            { id: "cloud", img: "assets/Image_Cloud.png", text: "☁️ Data stored on remote servers", feedback: "Cloud storage keeps files safe on the web so you can grab them from any gadget." },
            { id: "internet", img: "assets/Image_Internet.png", text: "🌐 Required to access cloud", feedback: "The Cloud relies on network connections to talk to servers around the world." },
            { id: "datacenter", img: "assets/Image_DataCenter.png", text: "🏢 Data servers around the world", feedback: "Datacenters are high-security physical buildings filled with supercomputers storing global files." }
        ];

        let selectedImageId = null;
        let selectedTextId = null;
        let score = 0;
        let incorrectAttempts = 0;
        let isMuted = false;

        // Load Sequencing
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('splashScreen');
                splash.style.opacity = 0;
                setTimeout(() => {
                    splash.style.display = 'none';
                    document.getElementById('introScreen').classList.add('active');
                }, 500);
            }, 5000); // Strict 5 second branding display
        });

        function showGame() {
            document.getElementById('introScreen').classList.remove('active');
            document.getElementById('gameScreen').classList.add('active');
            setupBoard();
        }

        // Generate matching UI elements safely without confusing drag-and-drop actions
        function setupBoard() {
            score = 0;
            incorrectAttempts = 0;
            document.getElementById('currentScore').innerText = score;
            document.getElementById('feedbackPanel').className = "";
            document.getElementById('feedbackPanel').innerText = "";

            const imgCol = document.getElementById('imageColumn');
            const txtCol = document.getElementById('textColumn');
            imgCol.innerHTML = "";
            txtCol.innerHTML = "";

            // Shuffle matching options independently to randomize layouts
            let shuffledImgs = [...gameItems].sort(() => Math.random() - 0.5);
            let shuffledTexts = [...gameItems].sort(() => Math.random() - 0.5);

            shuffledImgs.forEach(item => {
                let card = document.createElement('div');
                card.className = "interactive-card";
                card.dataset.id = item.id;
                card.innerHTML = `<img src="${item.img}" alt="Match option">`;
                card.onclick = () => selectItem(card, 'image');
                imgCol.appendChild(card);
            });

            shuffledTexts.forEach(item => {
                let card = document.createElement('div');
                card.className = "interactive-card";
                card.dataset.id = item.id;
                card.innerText = item.text;
                card.onclick = () => selectItem(card, 'text');
                txtCol.appendChild(card);
            });
        }

        function selectItem(card, type) {
            if (card.classList.contains('matched')) return;

            if (type === 'image') {
                document.querySelectorAll('#imageColumn .interactive-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedImageId = card.dataset.id;
            } else {
                document.querySelectorAll('#textColumn .interactive-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedTextId = card.dataset.id;
            }

            // Verify matches instantly when items from both collections are selected
            if (selectedImageId && selectedTextId) {
                checkMatch();
            }
        }

        function checkMatch() {
            const imgCard = document.querySelector(`#imageColumn .interactive-card[data-id="${selectedImageId}"].selected`);
            const txtCard = document.querySelector(`#textColumn .interactive-card[data-id="${selectedTextId}"].selected`);
            const matchedItem = gameItems.find(item => item.id === selectedImageId);
            const feedbackPanel = document.getElementById('feedbackPanel');

            if (selectedImageId === selectedTextId) {
                // Correct Match Logic
                imgCard.classList.remove('selected');
                txtCard.classList.remove('selected');
                imgCard.classList.add('matched');
                txtCard.classList.add('matched');
                
                score++;
                document.getElementById('currentScore').innerText = score;
                feedbackPanel.className = "correct-banner";
                feedbackPanel.innerText = `Great! ${matchedItem.feedback}`;

                playSound('correctSound');
                createConfetti();

                if (score === gameItems.length) {
                    setTimeout(endGame, 2000);
                }
            } else {
                // Instructive Learning Feedback Logic
                incorrectAttempts++;
                imgCard.classList.remove('selected');
                txtCard.classList.remove('selected');
                
                feedbackPanel.className = "wrong-banner";
                feedbackPanel.innerText = `Not quite right! Keep trying to link items to their exact purpose.`;
                
                playSound('wrongSound');
            }

            // Clear choices for next cycle
            selectedImageId = null;
            selectedTextId = null;
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('muteBtn').innerText = isMuted ? "🔇 Sound: OFF" : "🔊 Sound: ON";
        }

        function playSound(audioId) {
            if (isMuted) return;
            const sound = document.getElementById(audioId);
            sound.currentTime = 0;
            sound.play().catch(() => {});
        }

        function createConfetti() {
            for (let i = 0; i < 15; i++) {
                let confetti = document.createElement("div");
                confetti.classList.add("confetti");
                confetti.style.left = Math.random() * window.innerWidth + "px";
                confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 2500);
            }
        }

        function endGame() {
            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('resultScreen').classList.add('active');

            const totalQuestions = gameItems.length;
            // Grade calculation logic safely weighs performance accuracy based on mistake count
            const finalPercentage = Math.max(0, Math.round(((totalQuestions - (incorrectAttempts * 0.25)) / totalQuestions) * 100));
            
            document.getElementById('finalScoreText').innerText = `You completed matching all pairs. Evaluation Performance Rate: ${finalPercentage}%`;
            
            const msgEl = document.getElementById('resultMessage');
            if (finalPercentage >= 75) {
                msgEl.innerText = "🌟 Good job!";
                msgEl.style.color = "#2ecc71";
            } else if (finalPercentage >= 40) {
                msgEl.innerText = "📚 Review this chapter and try again";
                msgEl.style.color = "#f39c12";
            } else {
                msgEl.innerText = "🔄 Let’s practise more";
                msgEl.style.color = "#e74c3c";
            }
        }

        function resetGame() {
            document.getElementById('resultScreen').classList.remove('active');
            document.getElementById('gameScreen').classList.add('active');
            setupBoard();
        }
    </script>
</body>
</html>
