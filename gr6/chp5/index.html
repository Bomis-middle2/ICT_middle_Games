<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weebly Competency Simulator</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: url('assets/weebly.png') no-repeat center center fixed; background-size: cover; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #logo-screen { position: fixed; inset: 0; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        #game-container { background: rgba(255, 255, 255, 0.98); width: 95%; max-width: 600px; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .action-btn { padding: 20px; border: 2px solid #3498db; background: #fff; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .action-btn:hover { background: #3498db; color: white; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="logo-screen"><img src="assets/innovine-logo.png" alt="Innovine Logo" style="width: 300px;"></div>

    <div id="game-container">
        <h2 id="task-title">Professional Task: Site Management</h2>
        <div id="score-display" style="font-weight: bold; margin-bottom: 10px;">Score: 0</div>
        <p id="task-desc">Select the correct tool to complete the task.</p>
        <div class="grid" id="action-grid"></div>
    </div>

    <script>
        setTimeout(() => document.getElementById('logo-screen').classList.add('hidden'), 5000);

        const tasks = [
            { t: "Make your site live for the public.", options: ["Publish", "Save", "Preview"], correct: "Publish" },
            { t: "Capture feedback from your site visitors.", options: ["Contact Form", "Map", "Text"], correct: "Contact Form" },
            { t: "Re-organize the sequence of your site pages.", options: ["Pages Tab", "Build Tab", "Theme"], correct: "Pages Tab" },
            { t: "Ensure your layout is optimized for smartphones.", options: ["Mobile View", "Site Settings", "Editor"], correct: "Mobile View" },
            { t: "Enhance your site's professional appearance with a cohesive color scheme.", options: ["Theme", "Gallery", "Title"], correct: "Theme" },
            { t: "Help users navigate to your physical office location.", options: ["Map", "Newsletter", "Text"], correct: "Map" }
        ];

        let cur = 0;
        let score = 0;
        let attemptedCorrectly = false; // Tracks if the current task was already attempted

        function load() {
            if (cur >= tasks.length) {
                document.getElementById('game-container').innerHTML = `<h1>Final Performance: ${score} / ${tasks.length}</h1><button onclick='location.reload()' style='padding:15px;'>Restart Simulator</button>`;
                return;
            }
            attemptedCorrectly = false; // Reset for new task
            document.getElementById('task-desc').innerText = tasks[cur].t;
            const grid = document.getElementById('action-grid');
            grid.innerHTML = '';
            
            tasks[cur].options.forEach(opt => {
                const b = document.createElement('div');
                b.className = 'action-btn';
                b.innerText = opt;
                b.onclick = () => {
                    if (opt === tasks[cur].correct) {
                        if (!attemptedCorrectly) {
                            score++;
                            document.getElementById('score-display').innerText = "Score: " + score;
                            attemptedCorrectly = true;
                        }
                        cur++;
                        load();
                    } else {
                        attemptedCorrectly = true; // Mark as attempted incorrectly
                        alert("Professional Error: That tool does not perform this function.");
                    }
                };
                grid.appendChild(b);
            });
        }
        load();
    </script>
</body>
</html>
